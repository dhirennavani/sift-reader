          - generic [ref=e211] [cursor=pointer]:
            - generic [ref=e212]: 00:00
            - generic [ref=e213]: Welcome back to the show. Today I'm sitting down with someone who's been at the center of one of the most interesting shifts in software engineering.
          - generic [ref=e214] [cursor=pointer]:
            - generic [ref=e215]: 00:42
            - generic [ref=e216]: So let's start with the big question — what happens when coding itself becomes solved? What does the job of a software engineer look like?
          - generic [ref=e217] [cursor=pointer]:
            - generic [ref=e218]: 01:15
            - generic [ref=e219]: "That's the question we think about every day. I think the honest answer is: we don't fully know. But I can tell you what we're seeing."
          - generic [ref=e220] [cursor=pointer]:
            - generic [ref=e221]: 02:03
            - generic [ref=e222]: Engineers are spending less time on the mechanics of writing code and more time on understanding problems deeply. The skill shifts from syntax to systems thinking.
          - generic [ref=e223] [cursor=pointer]:
            - generic [ref=e224]: 02:48
            - generic [ref=e225]: That's fascinating. So it's not that engineers become irrelevant — they become more important but in a different way?
          - generic [ref=e226] [cursor=pointer]:
            - generic [ref=e227]: 03:30
            - generic [ref=e228]: Exactly. The most important thing is to ship something that works. You can always iterate later. But you need to understand the problem well enough to know what 'works' means.
          - generic [ref=e229] [cursor=pointer]:
            - generic [ref=e230]: 04:15
            - generic [ref=e231]: How do you think about the build vs buy decision now? With AI making building easier, does the calculus change?
          - generic [ref=e232] [cursor=pointer]:
            - generic [ref=e233]: 05:02
            - generic [ref=e234]: It changes dramatically. The cost of building has dropped so much that the bar for buying is much higher now. You need a really compelling reason to take on a dependency.
          - generic [ref=e235] [cursor=pointer]:
            - generic [ref=e236]: 05:45
            - generic [ref=e237]: We've found that the best approach is to start simple, ship fast, and let real usage tell you where to invest. Most of the time, the features you think matter don't.
          - generic [ref=e238] [cursor=pointer]:
            - generic [ref=e239]: 06:30
            - generic [ref=e240]: What advice would you give to someone just starting their career in software engineering today?
          - generic [ref=e241] [cursor=pointer]:
            - generic [ref=e242]: 07:15
            - generic [ref=e243]: Focus on understanding problems, not just solutions. Learn to communicate clearly. And most importantly, build things — the best way to learn is by doing.
          - generic [ref=e244] [cursor=pointer]:
            - generic [ref=e245]: 08:00
            - generic [ref=e246]: I think curiosity is the most underrated skill. The engineers who thrive are the ones who ask 'why' relentlessly and aren't satisfied with surface-level answers.
